<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 폰 추천 테스트 | KT</title>
  <!-- AdSense: <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous"></script> -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #FFFFFF;
      --sf:      #F5F5F7;
      --sf2:     #EAEAEC;
      --text:    #1D1D1F;
      --muted:   #6E6E73;
      --border:  #D2D2D7;
      --accent:  #0066CC;
      --accent2: #5E5CE6;
      --font:    -apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
      --r:       16px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0; height: 52px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .logo { font-size: 0.95rem; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }

    /* ── Progress ── */
    #progressWrap { flex-shrink: 0; height: 4px; background: var(--sf2); display: none; }
    #progressFill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: 0 2px 2px 0;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    /* ── Screens ── */
    .screen { display: none; flex: 1; }
    .screen.active { display: flex; flex-direction: column; }

    /* ══════════════════════ LANDING ══════════════════════ */
    #screen-landing {
      align-items: center; justify-content: center;
      padding: 48px 24px 64px; text-align: center;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,102,204,.07) 0%, transparent 70%);
      position: relative; overflow: hidden;
    }
    /* Decorative blobs */
    #screen-landing::before {
      content: '';
      position: absolute; width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(94,92,230,.08) 0%, transparent 70%);
      top: -60px; right: -80px; pointer-events: none;
    }
    #screen-landing::after {
      content: '';
      position: absolute; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,102,204,.06) 0%, transparent 70%);
      bottom: 40px; left: -40px; pointer-events: none;
    }
    .landing-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,102,204,.08);
      border: 1px solid rgba(0,102,204,.18);
      color: var(--accent);
      font-size: 0.75rem; font-weight: 700;
      padding: 5px 14px; border-radius: 999px;
      margin-bottom: 20px; letter-spacing: .04em;
      position: relative; z-index: 1;
    }
    .landing-title {
      font-size: clamp(2rem, 5.5vw, 3rem);
      font-weight: 900; letter-spacing: -1.5px; line-height: 1.18;
      margin-bottom: 14px; position: relative; z-index: 1;
    }
    .landing-title em { font-style: normal; color: var(--accent); }
    .landing-sub {
      font-size: 1rem; color: var(--muted); line-height: 1.65;
      max-width: 340px; margin: 0 auto 36px;
      position: relative; z-index: 1;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--text); color: #fff;
      font-size: 0.97rem; font-weight: 700;
      padding: 15px 36px; border: none; border-radius: 999px;
      cursor: pointer; font-family: var(--font); letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      transition: opacity .2s, transform .2s, box-shadow .2s;
      position: relative; z-index: 1;
    }
    .btn-primary:hover { opacity: .85; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.22); }
    .btn-primary:active { transform: translateY(0); }
    .landing-meta { margin-top: 14px; font-size: 0.8rem; color: var(--muted); position: relative; z-index: 1; }
    .chips { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 32px; position: relative; z-index: 1; }
    .chip { font-size: 0.77rem; color: var(--muted); background: var(--sf); padding: 5px 13px; border-radius: 999px; }

    /* ══════════════════════ QUIZ ══════════════════════ */
    #screen-quiz { overflow-y: auto; }
    .quiz-inner { width: 100%; max-width: 560px; margin: 0 auto; padding: 32px 24px 80px; }
    .quiz-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .btn-back {
      background: none; border: none; color: var(--muted); font-size: 0.84rem;
      font-family: var(--font); cursor: pointer; padding: 6px 0;
      display: flex; align-items: center; gap: 4px; transition: color .15s;
    }
    .btn-back:hover { color: var(--text); }
    .q-counter { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
    .q-emoji { font-size: 2rem; margin-bottom: 10px; display: block; }
    .q-text { font-size: clamp(1.15rem,3vw,1.42rem); font-weight: 800; letter-spacing: -.5px; line-height: 1.35; margin-bottom: 22px; }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn {
      display: flex; align-items: center; gap: 13px;
      padding: 15px 17px;
      background: var(--sf); border: 2px solid transparent; border-radius: var(--r);
      cursor: pointer; text-align: left;
      font-size: 0.92rem; font-weight: 500; color: var(--text);
      font-family: var(--font); width: 100%;
      transition: border-color .15s, background .15s, transform .12s, box-shadow .15s;
    }
    .opt-btn:hover {
      border-color: var(--accent); background: rgba(0,102,204,.05);
      transform: translateX(3px); box-shadow: -3px 0 0 var(--accent);
    }
    .opt-btn.selected {
      border-color: var(--accent); background: rgba(0,102,204,.07);
      transform: translateX(3px); box-shadow: -3px 0 0 var(--accent);
    }
    .opt-e { font-size: 1.25rem; flex-shrink: 0; line-height: 1; }

    /* ══════════════════════ LOADING ══════════════════════ */
    #screen-loading { align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--sf2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .loading-sub { color: var(--muted); font-size: 0.85rem; }

    /* ══════════════════════ RESULT ══════════════════════ */
    #screen-result { overflow-y: auto; }
    .result-inner { width: 100%; max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }
    .result-header { text-align: center; margin-bottom: 36px; }
    .result-header-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .result-title { font-size: clamp(1.3rem,3.5vw,1.9rem); font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; }
    .result-title em { font-style: normal; color: var(--accent); }
    .result-sub { color: var(--muted); font-size: 0.87rem; }

    /* ── Phone Cards ── */
    .phone-cards { display: flex; flex-direction: column; gap: 14px; }
    .phone-card {
      border-radius: 22px; padding: 22px 22px 20px;
      position: relative; overflow: hidden;
    }
    .phone-card.rank-1 {
      background: linear-gradient(135deg, #1D2A3A 0%, #0D1B2A 100%);
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,102,204,.2);
    }
    .phone-card.rank-2 { background: var(--sf); }
    .phone-card.rank-3 { background: var(--sf); }
    /* subtle top border accent on rank-1 */
    .phone-card.rank-1::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .rank-pill {
      position: absolute; top: 18px; right: 18px;
      font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .rank-1 .rank-pill { background: rgba(255,255,255,.12); color: rgba(255,255,255,.75); }
    .rank-2 .rank-pill, .rank-3 .rank-pill { background: rgba(0,0,0,.07); color: var(--muted); }

    .card-body { display: flex; gap: 18px; align-items: flex-start; margin-bottom: 14px; }

    /* ── Phone SVG illustration ── */
    .phone-img-wrap {
      flex-shrink: 0; width: 82px; height: 110px;
      overflow: visible;
    }
    .phone-img-wrap svg { display: block; width: 82px; height: 110px; }

    .card-info { flex: 1; min-width: 0; padding-right: 70px; }
    .phone-name { font-size: 1.02rem; font-weight: 800; letter-spacing: -.4px; margin-bottom: 3px; }
    .phone-price { font-size: 0.79rem; font-weight: 500; margin-bottom: 11px; }
    .rank-1 .phone-price { color: rgba(255,255,255,.5); }
    .rank-2 .phone-price, .rank-3 .phone-price { color: var(--muted); }

    .match-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .match-track { flex: 1; height: 5px; border-radius: 999px; overflow: hidden; }
    .rank-1 .match-track { background: rgba(255,255,255,.12); }
    .rank-2 .match-track, .rank-3 .match-track { background: rgba(0,0,0,.09); }
    .match-fill { height: 100%; border-radius: 999px; transition: width 1s cubic-bezier(.22,1,.36,1); }
    .rank-1 .match-fill { background: linear-gradient(90deg,#4EA8FF,#A78BFA); }
    .rank-2 .match-fill, .rank-3 .match-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .match-pct { font-size: 0.79rem; font-weight: 700; white-space: nowrap; }
    .rank-1 .match-pct { color: rgba(255,255,255,.65); }
    .rank-2 .match-pct, .rank-3 .match-pct { color: var(--muted); }

    .phone-desc { font-size: 0.84rem; line-height: 1.6; margin-bottom: 11px; }
    .rank-1 .phone-desc { color: rgba(255,255,255,.62); }
    .rank-2 .phone-desc, .rank-3 .phone-desc { color: var(--muted); }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 0.72rem; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    .rank-1 .tag { background: rgba(255,255,255,.1); color: rgba(255,255,255,.72); }
    .rank-2 .tag, .rank-3 .tag { background: rgba(0,0,0,.06); color: var(--muted); }

    .new-badge {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      background: #FF3B30; color: white;
      padding: 2px 6px; border-radius: 999px; margin-left: 6px; vertical-align: middle;
    }

    .retry-wrap { text-align: center; margin-top: 28px; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; color: var(--text); font-size: 0.85rem; font-weight: 600;
      padding: 10px 24px; border: 1.5px solid var(--border); border-radius: 999px;
      cursor: pointer; font-family: var(--font); transition: border-color .15s, box-shadow .15s;
    }
    .btn-ghost:hover { border-color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* Footer */
    footer {
      flex-shrink: 0; border-top: 1px solid var(--border);
      padding: 16px 24px; text-align: center; color: var(--muted); font-size: 0.75rem;
    }

    @media (max-width: 480px) {
      .quiz-inner, .result-inner { padding: 24px 16px 60px; }
      .phone-card { padding: 16px; }
      .card-info { padding-right: 56px; }
      .phone-img-wrap { width: 68px; height: 92px; }
      .phone-img-wrap svg { width: 68px; height: 92px; }
      .chips { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo" onclick="return goHome()">내 폰 추천<span>.</span></a>
</header>

<div id="progressWrap"><div id="progressFill" style="width:0%"></div></div>

<!-- ── LANDING ── -->
<div class="screen active" id="screen-landing">
  <div class="landing-badge">✦ 2025–2026 최신 라인업</div>
  <h1 class="landing-title">나에게 딱 맞는<br><em>폰</em> 찾기</h1>
  <p class="landing-sub">7가지 질문으로 취향과 라이프스타일을 분석해<br>최적의 스마트폰을 추천해드려요.</p>
  <button class="btn-primary" onclick="startQuiz()">
    테스트 시작하기
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
  <p class="landing-meta">7개 질문 · 약 1분</p>
  <div class="chips">
    <span class="chip">✦ 무료</span>
    <span class="chip">✦ 삼성 · 애플 · 모토로라 · 샤오미</span>
    <span class="chip">✦ 즉시 결과 확인</span>
  </div>
</div>

<!-- ── QUIZ ── -->
<div class="screen" id="screen-quiz">
  <div class="quiz-inner">
    <div class="quiz-topbar">
      <button class="btn-back" id="btnBack" onclick="prevQ()">← 이전</button>
      <span class="q-counter" id="qCounter">1 / 7</span>
    </div>
    <span class="q-emoji" id="qEmoji"></span>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optContainer"></div>
  </div>
</div>

<!-- ── LOADING ── -->
<div class="screen" id="screen-loading">
  <div class="spinner"></div>
  <div class="loading-title">분석 중이에요...</div>
  <div class="loading-sub">취향에 맞는 최적의 폰을 찾고 있어요</div>
</div>

<!-- ── RESULT ── -->
<div class="screen" id="screen-result">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-header-icon">🎯</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-sub">분석 완료 · 상위 3개 추천</p>
    </div>
    <!--
    AdSense 결과 중간 슬롯:
    <div style="margin-bottom:20px;min-height:100px;background:#F5F5F7;border-radius:16px;display:flex;align-items:center;justify-content:center">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>
    -->
    <div class="phone-cards" id="phoneCards"></div>
    <div class="retry-wrap">
      <button class="btn-ghost" onclick="restart()">↺ 다시 테스트하기</button>
    </div>
  </div>
</div>

<footer>© 2026 KT Corporation. All rights reserved.</footer>

      { e:'✨', t:'좋으면 좋겠지만 최고급은 필요 없어',   s:{ s25fe:3, moto_edge50:3, i17air:2 } },

      { e:'🚀', t:'성능! 빠릿빠릿하게 처리되어야 해',     s:{ s26ultra:4, i17pro:3, xiaomi15:2 } },

      { e:'📅', t:'5년 이상 오래오래 쓸 거야',             s:{ i17pro:4, s26ultra:2, xiaomi15:1 } },

// ══ STATE ══
let curQ = 0;
let answers = new Array(QS.length).fill(null);
let scores  = {};
PHONES.forEach(p => scores[p.id] = 0);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('progressWrap').style.display = id === 'quiz' ? 'block' : 'none';
}
function goHome() { restart(); return false; }

function startQuiz() {
  curQ = 0; answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('quiz'); render();
}

function render() {
  const q = QS[curQ];
  document.getElementById('qCounter').textContent = (curQ + 1) + ' / ' + QS.length;
  document.getElementById('qEmoji').textContent   = q.emoji;
  document.getElementById('qText').textContent    = q.text;
  document.getElementById('btnBack').style.visibility = curQ === 0 ? 'hidden' : 'visible';
  document.getElementById('progressFill').style.width = (curQ / QS.length * 100) + '%';

  const box = document.getElementById('optContainer');
  box.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[curQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-e">${opt.e}</span><span>${opt.t}</span>`;
    btn.onclick = () => pick(i);
    box.appendChild(btn);
  });
}

function pick(i) {
  if (answers[curQ] !== null) {
    Object.entries(QS[curQ].opts[answers[curQ]].s).forEach(([id,v]) => scores[id] -= v);
  }
  answers[curQ] = i;
  Object.entries(QS[curQ].opts[i].s).forEach(([id,v]) => scores[id] += v);
  document.querySelectorAll('.opt-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  setTimeout(() => { curQ < QS.length - 1 ? (curQ++, render()) : loading(); }, 260);
}

function prevQ() { if (curQ > 0) { curQ--; render(); } }

function loading() { showScreen('loading'); setTimeout(showResult, 1500); }

function showResult() {
  const sorted = [...PHONES].sort((a,b) => scores[b.id] - scores[a.id]);
  const top3   = sorted.slice(0,3);
  const best   = scores[top3[0].id] || 1;

  const name = top3[0].name.split(' ').slice(-2).join(' ');
  document.getElementById('resultTitle').innerHTML = `<em>${name}</em> 추천!`;

  const container = document.getElementById('phoneCards');
  container.innerHTML = '';
  const ranks = ['🥇 BEST MATCH', '🥈 2순위', '🥉 3순위'];
  const cls   = ['rank-1', 'rank-2', 'rank-3'];

  top3.forEach((phone, i) => {
    const pct  = Math.round(scores[phone.id] / best * 100);
    const card = document.createElement('div');
    card.className = `phone-card ${cls[i]}`;
    card.innerHTML = `
      <div class="rank-pill">${ranks[i]}</div>
      <div class="card-body">
        <div class="phone-img-wrap">${SVGS[phone.id] || ''}</div>
        <div class="card-info">
          <div class="phone-name">${phone.name}${phone.isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
          <div class="phone-price">${phone.price}</div>
          <div class="match-row">
            <div class="match-track"><div class="match-fill" style="width:0%" data-w="${pct}%"></div></div>
            <div class="match-pct">${pct}%</div>
          </div>
          <p class="phone-desc">${phone.desc}</p>
          <div class="tags">${phone.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  showScreen('result');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.match-fill').forEach(el => el.style.width = el.dataset.w);
  }));
}

function restart() {
  curQ = 0; answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('landing');
}
</script>
